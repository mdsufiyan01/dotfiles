# Set prefix to Ctrl+Space
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

# Improve split pane experience
bind | split-window -h
bind - split-window -v

# Enable mouse support
set -g mouse on

# Set window and pane index to 1 (instead of 0)
set -g base-index 1
setw -g pane-base-index 1

# Reload config file with Prefix r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# Increase history limit for scrolling mode
set -g history-limit 10000

# Use vi key bindings in copy mode
setw -g mode-keys vi

# Set status bar colors
set -g status-style fg=lime,bg=black

# Set default window and pane index starting number
set -g base-index 1
setw -g pane-base-index 1

# Resize panes using Ctrl+arrow keys
bind -n C-Up resize-pane -U 1
bind -n C-Down resize-pane -D 1
bind -n C-Left resize-pane -L 1
bind -n C-Right resize-pane -R 1

# Use Alt-arrow keys without prefix key to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D


# Key binding to toggle pane synchronization
bind s setw synchronize-panes \; display "Pane synchronization enabled"
